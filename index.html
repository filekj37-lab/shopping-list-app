<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    /* ── 헤더 ── */
    .header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 28px 28px 24px;
      color: #fff;
    }
    .header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; }
    .header .subtitle { font-size: 0.85rem; opacity: 0.8; margin-top: 4px; }
    .stats {
      display: flex;
      gap: 16px;
      margin-top: 16px;
    }
    .stat {
      background: rgba(255,255,255,0.18);
      border-radius: 10px;
      padding: 8px 14px;
      font-size: 0.82rem;
      font-weight: 600;
    }
    .stat span { font-size: 1.1rem; display: block; }

    /* ── 입력 영역 ── */
    .input-area {
      padding: 20px 24px;
      border-bottom: 1px solid #f0f0f0;
    }
    .input-row {
      display: flex;
      gap: 10px;
    }
    .input-row input {
      flex: 1;
      border: 2px solid #e8e8e8;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      color: #333;
    }
    .input-row input:focus { border-color: #667eea; }
    .input-row input::placeholder { color: #bbb; }
    .btn-add {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 1.3rem;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      line-height: 1;
    }
    .btn-add:hover { opacity: 0.9; transform: scale(1.05); }
    .btn-add:active { transform: scale(0.97); }

    /* ── 필터 ── */
    .filters {
      display: flex;
      gap: 8px;
      padding: 12px 24px;
      border-bottom: 1px solid #f0f0f0;
    }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid #e0e0e0;
      background: none;
      font-size: 0.82rem;
      cursor: pointer;
      color: #777;
      transition: all 0.15s;
      font-weight: 500;
    }
    .filter-btn.active {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-color: transparent;
      color: #fff;
    }

    /* ── 리스트 ── */
    .list { padding: 12px 0; min-height: 60px; }

    .empty {
      text-align: center;
      color: #ccc;
      padding: 32px;
      font-size: 0.9rem;
    }
    .empty .icon { font-size: 2.5rem; display: block; margin-bottom: 8px; }

    .item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 24px;
      border-bottom: 1px solid #f8f8f8;
      transition: background 0.15s;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .item:last-child { border-bottom: none; }
    .item:hover { background: #fafafa; }

    /* 체크박스 */
    .check-wrap {
      position: relative;
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }
    .check-wrap input[type="checkbox"] {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
      margin: 0;
    }
    .check-box {
      width: 22px;
      height: 22px;
      border: 2px solid #d0d0d0;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.18s;
      background: #fff;
      pointer-events: none;
    }
    .check-wrap input:checked ~ .check-box {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-color: transparent;
    }
    .check-box svg {
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.15s;
    }
    .check-wrap input:checked ~ .check-box svg {
      opacity: 1;
      transform: scale(1);
    }

    /* 아이템 텍스트 */
    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #333;
      transition: all 0.2s;
      word-break: break-all;
    }
    .item.done .item-text {
      text-decoration: line-through;
      color: #bbb;
    }

    /* 삭제 버튼 */
    .btn-del {
      background: none;
      border: none;
      color: #ddd;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: all 0.15s;
      line-height: 1;
      flex-shrink: 0;
    }
    .btn-del:hover { color: #f56; background: #fff0f2; }

    /* ── 하단 바 ── */
    .footer {
      padding: 14px 24px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-text { font-size: 0.82rem; color: #bbb; }
    .btn-clear {
      background: none;
      border: 1.5px solid #f5c6cb;
      color: #e57373;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
      font-weight: 500;
    }
    .btn-clear:hover { background: #fff5f5; }
    .btn-clear:disabled { opacity: 0.3; cursor: default; }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>🛒 쇼핑 리스트</h1>
    <p class="subtitle">필요한 것들을 놓치지 마세요</p>
    <div class="stats">
      <div class="stat"><span id="stat-total">0</span>전체</div>
      <div class="stat"><span id="stat-done">0</span>완료</div>
      <div class="stat"><span id="stat-left">0</span>남은 것</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <input id="item-input" type="text" placeholder="아이템 추가 (Enter 또는 + 버튼)" maxlength="60" />
      <button class="btn-add" id="btn-add" title="추가">＋</button>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all">전체</button>
    <button class="filter-btn" data-filter="todo">미완료</button>
    <button class="filter-btn" data-filter="done">완료</button>
  </div>

  <ul class="list" id="list"></ul>

  <div class="footer">
    <span class="footer-text" id="footer-text"></span>
    <button class="btn-clear" id="btn-clear">완료 항목 삭제</button>
  </div>
</div>

<script>
  // ── 상태 ──
  let items = JSON.parse(localStorage.getItem('shopping-list') || '[]');
  let filter = 'all';
  let nextId = items.length ? Math.max(...items.map(i => i.id)) + 1 : 1;

  // ── 저장 ──
  function save() {
    localStorage.setItem('shopping-list', JSON.stringify(items));
  }

  // ── 렌더 ──
  function render() {
    const list = document.getElementById('list');
    const visible = items.filter(i =>
      filter === 'all' ? true : filter === 'done' ? i.done : !i.done
    );

    if (visible.length === 0) {
      list.innerHTML = `<li class="empty"><span class="icon">${filter === 'done' ? '✅' : '🛍️'}</span>${
        filter === 'done' ? '완료된 항목이 없습니다' :
        filter === 'todo' ? '모든 항목을 완료했습니다!' : '아이템을 추가해보세요'
      }</li>`;
    } else {
      list.innerHTML = visible.map(item => `
        <li class="item ${item.done ? 'done' : ''}" data-id="${item.id}">
          <label class="check-wrap">
            <input type="checkbox" ${item.done ? 'checked' : ''} onchange="toggle(${item.id})" />
            <span class="check-box">
              <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
                <path d="M1 5l3.5 3.5L11 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
          </label>
          <span class="item-text">${escHtml(item.text)}</span>
          <button class="btn-del" onclick="remove(${item.id})" title="삭제">✕</button>
        </li>
      `).join('');
    }

    const total = items.length;
    const done  = items.filter(i => i.done).length;
    const left  = total - done;

    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-done').textContent  = done;
    document.getElementById('stat-left').textContent  = left;
    document.getElementById('footer-text').textContent =
      total ? `총 ${total}개 · 완료 ${done}개` : '항목을 추가해보세요';

    const clearBtn = document.getElementById('btn-clear');
    clearBtn.disabled = done === 0;
  }

  // ── 추가 ──
  function addItem() {
    const input = document.getElementById('item-input');
    const text  = input.value.trim();
    if (!text) return;
    items.unshift({ id: nextId++, text, done: false });
    input.value = '';
    save();
    render();
    input.focus();
  }

  // ── 토글 ──
  function toggle(id) {
    const item = items.find(i => i.id === id);
    if (item) { item.done = !item.done; save(); render(); }
  }

  // ── 삭제 ──
  function remove(id) {
    items = items.filter(i => i.id !== id);
    save();
    render();
  }

  // ── 완료 항목 일괄 삭제 ──
  function clearDone() {
    items = items.filter(i => !i.done);
    save();
    render();
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── 이벤트 ──
  document.getElementById('btn-add').addEventListener('click', addItem);
  document.getElementById('item-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addItem();
  });
  document.getElementById('btn-clear').addEventListener('click', clearDone);
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filter = btn.dataset.filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });
  });

  render();
</script>
</body>
</html>
